<!DOCTYPE html>
<html>
<head>
    <title>EnglishPeer — Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
    <span class="logo">Englishpeer</span>
</nav>
<div class="auth-wrapper">
    <div class="auth-box" style="width:480px;">
        <h2>Create account</h2>
        <p class="subtitle">Join to EnglishPeer</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Country</label>
                <input type="text" name="country" id="countryInput" placeholder="Type country name..." required autocomplete="off">
                <div id="countrySuggestions" style="border:1px solid #e2e8f0;border-radius:8px;display:none;max-height:180px;overflow-y:auto;background:white;"></div>
            </div>
            <div class="form-group">
                <label>Education Level</label>
                <select name="education" required style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;">
                    <option value="">Select level</option>
                    <option value="School">School</option>
                    <option value="College">College</option>
                    <option value="University">University</option>
                    <option value="Graduate">Graduate</option>
                    <option value="Professional">Professional</option>
                </select>
            </div>
            <div class="form-group">
                <label>I want to</label>
                <select name="role" required style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;">
                    <option value="">Select role</option>
                    <option value="Student">Learn English (Student)</option>
                    <option value="Teacher">Teach English (Teacher)</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        
            <script>
            var countries = [
                "Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan",
                "Bahrain","Bangladesh","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi",
                "Cambodia","Cameroon","Canada","Chad","Chile","China","Colombia","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic",
                "Denmark","Djibouti","Dominican Republic",
                "Ecuador","Egypt","El Salvador","Estonia","Ethiopia",
                "Finland","France",
                "Gabon","Gambia","Georgia","Germany","Ghana","Greece","Guatemala","Guinea",
                "Haiti","Honduras","Hungary",
                "Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy",
                "Jamaica","Japan","Jordan",
                "Kazakhstan","Kenya","Kuwait","Kyrgyzstan",
                "Laos","Latvia","Lebanon","Libya","Lithuania","Luxembourg",
                "Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Mauritania","Mauritius","Mexico","Moldova","Mongolia","Montenegro","Morocco","Mozambique","Myanmar",
                "Namibia","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","Norway",
                "Oman",
                "Pakistan","Palestine","Panama","Paraguay","Peru","Philippines","Poland","Portugal",
                "Qatar",
                "Romania","Russia","Rwanda",
                "Saudi Arabia","Senegal","Serbia","Sierra Leone","Singapore","Slovakia","Slovenia","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Sweden","Switzerland","Syria",
                "Taiwan","Tajikistan","Tanzania","Thailand","Togo","Tunisia","Turkey","Turkmenistan",
                "Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan",
                "Venezuela","Vietnam",
                "Yemen",
                "Zambia","Zimbabwe"
            ];

            document.getElementById('countryInput').addEventListener('input', function() {
                var val = this.value.toLowerCase();
                var box = document.getElementById('countrySuggestions');
                box.innerHTML = '';
                if (!val) { box.style.display = 'none'; return; }

                var matches = countries.filter(c => c.toLowerCase().startsWith(val));
                if (matches.length === 0) { box.style.display = 'none'; return; }

                matches.forEach(function(country) {
                    var div = document.createElement('div');
                    div.textContent = country;
                    div.style.cssText = 'padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:0.5px solid #f1f5f9;';
                    div.onmouseover = function() { this.style.background = '#f0f4ff'; };
                    div.onmouseout = function() { this.style.background = 'white'; };
                    div.onclick = function() {
                        document.getElementById('countryInput').value = country;
                        box.style.display = 'none';
                    };
                    box.appendChild(div);
                });
                box.style.display = 'block';
            });

            document.addEventListener('click', function(e) {
                if (e.target.id !== 'countryInput') {
                    document.getElementById('countrySuggestions').style.display = 'none';
                }
            });
            </script>    
                    
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/">Login</a>
        </div>
    </div>
</div>
</body>
</html>
