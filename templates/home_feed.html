<!DOCTYPE html>
<html>
<head>
    <title>EnglishPeer — Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>
<nav class="navbar">
    <span class="logo">EnglishPeer</span>
    <div class="nav-links">
        <a href="/home">home</a>
        <a href="/home?role=Teacher">Teachers</a>
        <a href="/friends">Friends</a>
        <a href="/messages">Messages</a>
        <a href="/notifications" style="position:relative;">
    Notification
    {% if notif_count is defined and notif_count > 0 %}
    <span style="background:#ef4444;color:white;border-radius:50%;padding:1px 6px;font-size:11px;position:absolute;top:-8px;right:-10px;">{{ notif_count }}</span>
    {% endif %}
</a>
    </div>
    <div class="nav-avatar">{{ username[0]|upper }}</div>
</nav>

<div style="padding:28px;">
    <h2>Welcome, {{ username }}!</h2>
    <p>Total users: {{ users|length }}</p>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script>
    var email = "{{ email }}";
    var socket = io();
    socket.emit('join_personal', { username: email });

    socket.on('incoming_call_notify', function(data) {
        if (confirm(data.caller + ' is calling you! Accept?')) {
            window.location.href = '/call/' + data.caller;
        }
    });
</script>


</body>
</html>
